<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapTo AI — Admin Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020608;
            --surface: #0a1a22;
            --cyan: #00e5ff;
            --green: #00ff9d;
            --red: #ff2d55;
            --amber: #ffb800;
            --white: #e8f4f8;
            --muted: #5a7d8a;
            --border: rgba(0, 229, 255, 0.15);
            --glow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Syne', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* SCANLINE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
            pointer-events: none;
            z-index: 9998;
        }

        header {
            padding: 20px 40px;
            background: rgba(2, 6, 8, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--cyan);
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        .admin-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 4px 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        main {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--cyan);
        }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--white);
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .stat-value.live {
            color: var(--green);
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
        }
        
        .stat-value.live::before {
            content: '●';
            font-size: 1rem;
            vertical-align: middle;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .monitor-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .panel {
            background: rgba(10, 26, 34, 0.4);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            padding: 24px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: var(--cyan);
            text-transform: uppercase;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
        }

        th {
            text-align: left;
            padding: 12px;
            color: var(--muted);
            font-weight: normal;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .email-cell {
            color: var(--cyan);
            font-weight: bold;
        }

        .status-badge {
            padding: 2px 8px;
            font-size: 0.6rem;
            text-transform: uppercase;
            border-radius: 2px;
        }

        .status-badge.admin { background: rgba(255, 45, 85, 0.2); color: var(--red); border: 1px solid var(--red); }
        .status-badge.viewer { background: rgba(0, 229, 255, 0.2); color: var(--cyan); border: 1px solid var(--cyan); }
        .status-badge.waitlist { background: rgba(255, 184, 0, 0.2); color: var(--amber); border: 1px solid var(--amber); }

        .activity-log {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .log-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
        }

        .log-item.login { border-left-color: var(--green); }
        .log-item.lead { border-left-color: var(--amber); }

        .log-time { color: var(--muted); margin-bottom: 4px; }
        .log-msg { line-height: 1.4; }
        .log-msg b { color: var(--white); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

        .btn-refresh {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 6px 16px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh:hover {
            background: var(--cyan);
            color: var(--bg);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 5px;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">INITIALIZING MONITOR...</div>

    <header>
        <div class="logo">SNAPTO AI<span>.</span>ADMIN</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="admin-badge" id="admin-name">ADMIN: ACCESS GRANTED</div>
            <a href="dashboard.html" style="color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.7rem; text-decoration: none;">BACK TO DASHBOARD</a>
        </div>
    </header>

    <main>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Live Connections</div>
                <div class="stat-value live" id="live-users">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Registered Users</div>
                <div class="stat-value" id="total-users">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Captured Leads</div>
                <div class="stat-value" id="total-leads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Logins (24H)</div>
                <div class="stat-value" id="recent-logins">0</div>
            </div>
        </div>

        <div class="monitor-layout">
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">User Registry (Email IDs)</h2>
                    <button class="btn-refresh" onclick="fetchData()">REFRESH DATA</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Email / Username</th>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Last Login</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">Lead Pipeline</h2>
                </div>
                <div class="activity-log" id="lead-log">
                    <!-- Data injected here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');

        // SECURITY CHECK
        async function checkAuth() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.user.role !== 'admin') {
                    alert('ADMIN ACCESS ONLY');
                    window.location.href = 'dashboard.html';
                    return;
                }
                
                document.getElementById('admin-name').innerText = `ADMIN: ${data.user.name.toUpperCase()}`;
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
                
                fetchData();
                startLiveStats();
            } catch (err) {
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            }
        }

        async function fetchData() {
            try {
                const [statsRes, listRes] = await Promise.all([
                    fetch('/api/admin/monitoring-stats', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/admin/users-list', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const statsData = await statsRes.json();
                const listData = await listRes.json();

                if (statsData.success) {
                    const s = statsData.stats;
                    document.getElementById('live-users').innerText = s.liveUsers;
                    document.getElementById('total-users').innerText = s.totalUsers;
                    document.getElementById('total-leads').innerText = s.totalLeads;
                    document.getElementById('recent-logins').innerText = s.recentLogins;
                }

                if (listData.success) {
                    renderUsers(listData.users);
                    renderLeads(listData.leads);
                }
            } catch (err) {
                console.error('Error fetching admin data:', err);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td class="email-cell">${user.username}</td>
                    <td>${user.name}</td>
                    <td><span class="status-badge ${user.role}">${user.role}</span></td>
                    <td>${user.last_login ? new Date(user.last_login).toLocaleString() : 'Never'}</td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function renderLeads(leads) {
            const log = document.getElementById('lead-log');
            log.innerHTML = leads.map(lead => `
                <div class="log-item lead">
                    <div class="log-time">${new Date(lead.created_at).toLocaleString()}</div>
                    <div class="log-msg">New Email Access: <b class="email-cell">${lead.email}</b> [Status: ${lead.status}]</div>
                </div>
            `).join('');
        }

        function startLiveStats() {
            // Refresh counts every 10 seconds for real-time feel
            setInterval(fetchData, 10000);
        }

        checkAuth();
    </script>
</body>
</html>
